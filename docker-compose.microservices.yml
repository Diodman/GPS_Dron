version: '3.8'

services:
  # Основной API сервер
  api-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ROUTE_SERVICE_URL=http://route-service:8001
      - DRONE_SERVICE_URL=http://drone-service:8002
      - ORDER_SERVICE_URL=http://order-service:8003
    depends_on:
      - redis
      - route-service
      - drone-service
      - order-service
    volumes:
      - ./cache_data:/app/cache_data

  # Сервис планирования маршрутов
  route-service:
    build: .
    command: python microservices/route_service.py
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - ./cache_data:/app/cache_data

  # Сервис управления дронами
  drone-service:
    build: .
    command: python microservices/drone_service.py
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      - redis

  # Сервис управления заказами
  order-service:
    build: .
    command: python microservices/order_service.py
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379/3
    depends_on:
      - redis

  # Redis для кэширования и координации
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Nginx для балансировки нагрузки
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-server
      - route-service
      - drone-service
      - order-service

volumes:
  redis_data:

